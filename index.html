<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Rod II - Sistema de Múltiplos Perfis</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #game-container {
            min-height: 100vh;
            position: relative;
        }

        /* Loading screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 71, 87, 0.3);
            border-top: 5px solid #ff4757;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-modules {
            margin-top: 30px;
            width: 300px;
            max-width: 80%;
        }

        .module-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 0.9rem;
        }

        .module-status {
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
        }

        .status-loading {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status-success {
            background: rgba(76, 209, 55, 0.2);
            color: #4cd137;
        }

        .status-error {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Tela de loading minimalista -->
    <div id="loading-screen" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        color: white;
        text-align: center;
        transition: opacity 0.5s ease;
    ">
        <div style="
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,71,87,0.3);
            border-top: 5px solid #ff4757;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        "></div>
        <h2 style="color: #ff4757; margin-bottom: 10px;">STREET ROD II</h2>
        <p style="color: #aaa;">Inicializando...</p>

        <!-- Botão de emergência -->
        <button id="emergency-btn" onclick="skipLoading()" style="
            margin-top: 30px;
            padding: 10px 20px;
            background: rgba(255,71,87,0.2);
            color: #ff4757;
            border: 1px solid rgba(255,71,87,0.5);
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            cursor: pointer;
            display: none;
        ">
            Pular Loading
        </button>
    </div>

    <!-- Container do jogo -->
    <div id="game-container"></div>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Scripts ESSENCIAIS (apenas os básicos) -->
    <script src="js/ProfileManager.js"></script>
    <script src="js/EventSystem.js"></script>

    <!-- Bootstrap DEVE SER O ÚLTIMO -->
    <script src="js/bootstrap.js"></script>

    <!-- Script de emergência -->
    <script>
        // Mostrar botão de emergência após 5 segundos
        setTimeout(() => {
            const btn = document.getElementById('emergency-btn');
            if (btn) {
                btn.style.display = 'block';
            }
        }, 5000);

        // Função para pular loading manualmente
        window.skipLoading = function () {
            console.log('🚨 Pulo de loading manual acionado');

            // Esconder loading
            const loading = document.getElementById('loading-screen');
            if (loading) {
                loading.style.display = 'none';
            }

            // Verificar se temos sistema básico
            if (window.eventSystem) {
                // Registrar telas mínimas se necessário
                if (window.mainMenuScreen && !window.eventSystem.screens['main-menu']) {
                    window.eventSystem.registerScreen('main-menu', window.mainMenuScreen);
                }
                if (window.profileSelectionScreen && !window.eventSystem.screens['profile-selection']) {
                    window.eventSystem.registerScreen('profile-selection', window.profileSelectionScreen);
                }

                // Mostrar seleção de perfis
                window.eventSystem.showScreen('profile-selection');
            } else {
                // Sistema básico não carregou
                document.getElementById('game-container').innerHTML = `
                    <div style="padding: 40px; text-align: center; color: white;">
                        <h2 style="color: #ff4757;">SISTEMA NÃO CARREGADO</h2>
                        <p style="color: #aaa; margin: 20px 0;">
                            Recarregue a página ou verifique os arquivos.
                        </p>
                        <button onclick="location.reload()" style="
                            padding: 10px 20px;
                            background: #ff4757;
                            color: white;
                            border: none;
                            border-radius: 6px;
                        ">
                            Recarregar
                        </button>
                    </div>
                `;
            }
        };

        // Carregar outras telas após o bootstrap
        window.addEventListener('load', function () {
            console.log('📦 Carregando telas adicionais...');

            // Carregar telas adicionais de forma assíncrona
            const additionalScripts = [
                'js/MainMenuScreen.js',
                'js/ProfileSelectionScreen.js',
                'js/ProfileCreationScreen.js',
                'js/GarageScreen.js',
                'js/SettingsScreen.js'
            ];

            additionalScripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                document.head.appendChild(script);
            });
        });
    </script>
</body>

</html>
